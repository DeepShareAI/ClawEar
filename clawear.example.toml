# Copy to ~/.config/clawear/config.toml and edit.

log_level = "INFO"

# Output destinations.
# transcripts_dir should be inside a JavisContext WATCH_DIRECTORIES entry
# so transcripts auto-index.
transcripts_dir = "~/Documents/knowledge-base/clawear"
recordings_dir  = "~/ClawEar/recordings"
events_dir      = "~/ClawEar/events"

# OpenAI Realtime settings.
openai_model = "gpt-4o-realtime-preview"
# System instructions for the model. Default = transcription + passive notes.
instructions = """
You are an audio observer. Transcribe the speaker's words faithfully.
When a clear topic shift, action item, decision, or named entity appears,
add a short inline note on its own line prefixed with "> note:".
Do not respond conversationally; do not add commentary beyond such notes.
"""

# Audio / streaming tuning.
queue_max_blocks = 1000         # ~20s of 20ms blocks before drop-oldest kicks in
realtime_sample_rate = 24000    # OpenAI Realtime fixed requirement
ws_reconnect = false            # out of scope; crash-and-report on drop
